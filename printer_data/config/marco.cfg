#####################################################################
#   Cleaning Nozzle
#####################################################################
[gcode_macro WIPE]
description: Wipe nozzle on silicone comb (center-based + zigzag)

# Comb parameters
variable_comb_x: 159        ; X center of the comb
variable_comb_y: 76         ; Y center of the comb
variable_comb_z: 4          ; Z when touching the comb

# General parameters
variable_comb_z_lift: 5.0     ; Nozzle lift before/after wiping
variable_comb_width: 26       ; Full width of the comb (mm)
variable_comb_cycles_1: 4     ; Number of cycles in the first pass
variable_comb_cycles_2: 3     ; Number of zigzags in the second pass
variable_comb_offset_y: 1.0   ; Y offset for the second pass
variable_comb_zigzag_shift: 0 ; X shift for each zigzag step

# Return to specified position
variable_return_x: 80
variable_return_y: 0

gcode:
    {% set half_width = comb_width / 2 %}
    {% set zigzag_shift = comb_zigzag_shift %}

    M117 Brushing nozzle

    # M109 S230                       ; 喷嘴升至230℃（阻塞），准备擦嘴
    # M104 S170                       ; 喷嘴降至170℃（非阻塞），开始擦嘴

    G90 ; Absolute coordinates
    G1 Z{comb_z_lift} F3000 ; Lift nozzle before moving
    G1 X{comb_x} Y{comb_y} F6000 ; Center of the comb
    G1 Z{comb_z} F3000 ; Contact with the comb

    ; First straight pass
    G91 ; Relative coordinates
    {% for i in range(comb_cycles_1) %}
        G1 Y{half_width} F4500
        G1 Y-{half_width * 2} F4500
        G1 Y{half_width} F4500
    {% endfor %}

    ; Lift slightly and move Y offset
    G1 Z0.3 Y{comb_offset_y} F3000

    ; Second pass — zigzag along X with a slight shift
    {% for i in range(comb_cycles_2) %}
        G1 Y{half_width + (zigzag_shift * i)} F4500
        G1 Y-{(half_width + (zigzag_shift * i)) * 2} F4500
        G1 Y{half_width + (zigzag_shift * i)} F4500
    {% endfor %}

    ; Lift and return
    G90
    G1 Z{comb_z_lift} F3000
    G28 Z                           ; 归位Z轴
    # G1 X{return_x} Y{return_y} F6000
    G4 P500

    M117 Nozzle cleaned

#####################################################################
#   Line Cleaning
#####################################################################
[gcode_macro INTRO_LINE]
gcode:
    M117 Printing line
    
    # 划线清理（左边延Y轴划线）
    #G90                          # 绝对定位
    #G1 X20 Y100 Z0.2 F2400       # 第一条线开始点
    #G1 Y200 F2400 E15            # 第一条线结束点
    #G1 X25 F2400                 # 第二条线开始点
    #G1 Y100 F2400 E15            # 第二条线结束点
    #G1 Z5 F2400                  # 抬升

    # 划线清理（前面延X轴划线）
    G90                          # 绝对定位
    G1 X10 Y5 Z0.2 F1800         # 第一条线开始点
    G1 X130 F1800 E10            # 第一条线结束点
    G1 Y8 F1800                  # 第二条线开始点
    G1 X70 F1800 E15             # 第二条线结束点
    G1 Z5 F1800                  # 抬升

#####################################################################
#   Set Fan Speed
#####################################################################

# https://github.com/OrcaSlicer/OrcaSlicer/wiki/printer_basic_information_accessory#auxiliary-part-cooling-fan
# https://www.answeroverflow.com/m/1187488942258409513
# https://github.com/OrcaSlicer/OrcaSlicer/wiki/printer_basic_information_accessory#support-air-filtration
# https://github.com/Rat-OS/RatOS-configuration/blob/3a6a8b018fd46ef4343a246a66b8c0fc357f05a4/macros/idex/overrides.cfg#L42
[gcode_macro M106]
# Only rename_existing if you have a sacrificial [fan] section
# rename_existing: M106.1
# The variable that controls fan speed swopping if not specifying P parameter
# -1 means the control is disabled, a value of 0-1 is the requested fan speed.
# Access via {printer["gcode_macro M106"].swap_speed}
# variable_swap_speed: -1
description: "Set fan speed (Orca compatible)"
gcode:
	# parameters
	# {% set fan = params.P|default(0)|int %}
	# {% set speed = (params.S|float / 255 if params.S is defined else 1.0) %}

    # set fan speed
    # {% if fan == 0 %}
        # RESPOND TYPE=command MSG="启用打印部件冷却风扇"
    #     SET_FAN_SPEED FAN=part_cooling_fan SPEED={speed}
    # {% elif fan == 2 %}
        # RESPOND TYPE=command MSG="启用辅助部件冷却风扇"
        # SET_FAN_SPEED FAN= SPEED={speed}
    # {% elif fan == 3 %}
        # RESPOND TYPE=command MSG="启用空气过滤/排气风扇"
    #     SET_FAN_SPEED FAN=nevermore_micro_v6_fan1 SPEED={speed}
    #     SET_FAN_SPEED FAN=nevermore_micro_v6_fan2 SPEED={speed}
    # {% else %}
    #     RESPOND TYPE=command MSG="未知风扇，请检查切片软件配置!"
    # {% endif %}

    {% set fan_map = {
        0: "part_cooling_fan",          ; Orca P0 → Part cooling fan
        2: "auxiliary_fan",             ; Orca P2 → Auxiliary fan
        3: "exhaust_fan",               ; Orca P3 → Exhaust fan
        
        8: "nevermore_micro_v6_fan1",   ; Nevermore Micro V6 fan
        9: "nevermore_micro_v6_fan2",   ; Nevermore Micro V6 fan
    } %}
    
    {% set p = params.P|int if 'P' in params else 0 %}
    {% set fan = fan_map[p] if p in fan_map else fan_map[0] %}
    {% set speed = (params.S|float / 255 if 'S' in params else 1.0) %}
    SET_FAN_SPEED FAN={fan} SPEED={speed}

[gcode_macro M107]
description: "Turn off fans. No P = all, P# = specific"
gcode:
    {% set fan_map = {
        0: "part_cooling_fan",          ; Orca P0 → Part cooling fan
        2: "auxiliary_fan",             ; Orca P2 → Auxiliary fan
        3: "exhaust_fan",               ; Orca P3 → Exhaust fan
        
        8: "nevermore_micro_v6_fan1",   ; Nevermore Micro V6 fan
        9: "nevermore_micro_v6_fan2",   ; Nevermore Micro V6 fan
    } %}

    {% if 'P' in params %}
        {% set p = params.P|int %}
        {% if p in fan_map %}
            SET_FAN_SPEED FAN={fan_map[p]} SPEED=0
        {% else %}
            RESPOND PREFIX="warn" MSG="Unknown fan index P{p}"
        {% endif %}
    {% else %}
        # No P -> turn off all mapped fans
        {% for f in fan_map.values() %}
            SET_FAN_SPEED FAN={f} SPEED=0
        {% endfor %}
    {% endif %}
