#####################################################################
#   PRINT_START & PRINT_END
#####################################################################

[gcode_macro PRINT_START]
# Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    {% set MATERIAL = params.MATERIAL|default(PLA)|string %}
    {% set CHAMBER_TEMP = params.CHAMBER_TEMP|default(0)|float %}
    # {% set NEVERMORE_FAN_SPEED = params.NEVERMORE_FAN_SPEED|default(0)|float %}

    RESPOND TYPE=command MSG='MATERIAL: {MATERIAL}'
    RESPOND TYPE=command MSG='BED: {BED_TEMP} C'
    RESPOND TYPE=command MSG='EXTRUDER: {EXTRUDER_TEMP} C'
    RESPOND TYPE=command MSG='CHAMBER: {CHAMBER_TEMP} C'
    # RESPOND TYPE=command MSG='NEVERMORE_FAN_SPEED: {NEVERMORE_FAN_SPEED} %'

    {% if CHAMBER_TEMP == 0 %}
        # If target temperature is 0, do nothing
        M117 Turn off chamber heating
        
        M190 S{BED_TEMP}                ; 热床加热到目标温度（阻塞）
        NEOPIXEL_DISPLAY LED="print_progress_bar" TYPE=extruder_temp MODE=glow
        M109 S{EXTRUDER_TEMP}           ; 喷嘴加热到目标温度
        M109 S170                       ; 喷嘴降至170℃
        M190 S{BED_TEMP}                ; 等待热床达到目标温度
    {% else %}
        ; 准备阶段：开启NeverMore Micro V6 Fan加速仓温循环与过滤
        # M106 P3 S{NEVERMORE_FAN_SPEED * 2.55}
        SET_FAN_SPEED FAN=nevermore_micro_v6_fan1 SPEED=0.6
        SET_FAN_SPEED FAN=nevermore_micro_v6_fan2 SPEED=0.6

        ; 第一阶段：同时开始加热热床和PTC
        RESPOND TYPE=command MSG="开始加热热床和PTC..."
        M140 S{BED_TEMP}                ; 设置热床温度（非阻塞）
        SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={CHAMBER_TEMP}  ; 设置PTC温度

        ; 第二阶段：等待仓温达到目标温度
        M117 Waiting for chamber target temperature
        RESPOND TYPE=command MSG="等待仓温接近目标温度..."
        ; 等待仓温达到精确温度
        TEMPERATURE_WAIT SENSOR="heater_generic chamber_heater" MINIMUM={CHAMBER_TEMP-5}
        RESPOND TYPE=command MSG="仓温已接近目标温度"
        M117 Chamber at target temperature

        ; 第三阶段：仓温达到后，开始加热喷嘴
        NEOPIXEL_DISPLAY LED="print_progress_bar" TYPE=extruder_temp MODE=glow
        M109 S{EXTRUDER_TEMP}           ; 喷嘴加热到目标温度
        M109 S170                       ; 喷嘴降至170℃
        
        ; 同时等待热床达到精确温度
        M190 S{BED_TEMP}                ; 等待热床达到目标温度
    {% endif %}

    G92 E0                          ; 重置挤出机
    BED_MESH_CLEAR                  ; 卸载网床
    G28                             ; 归位所有轴
    # WIPE                            ; 首次擦嘴
    # M109 S210                       ; 喷嘴降至210℃（阻塞）
    # M104 S170                       ; 喷嘴降至170℃（非阻塞）
    # WIPE                            ; 二次擦嘴（喷嘴温度从210℃缓慢降至170℃）
    # G28 Z                           ; 归位Z轴
    G90                             ; 绝对定位
    G1 X80 Y3 F3000                 ; 将喷嘴远离Z限位，防止撞击
    BED_MESH_PROFILE LOAD="ABS"     ; 加载ABS网床

    M117 Waiting for nozzle temperature

    M109 S{EXTRUDER_TEMP}           ; 设置热端温度并等待

    INTRO_LINE                      ; 划线清理

    NEOPIXEL_DISPLAY LED="print_progress_bar" TYPE=print_percent MODE=progress    ; 灯条显示打印进度

    M117 Printing...

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:

    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-4.0 F3600                 ; retract filament
    G91                            ; relative positioning

    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    #   Check end position to determine safe direction to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    G0 Z{z_safe} F3600    ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000    ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    BED_MESH_CLEAR
    G90                            ; absolute positioning
    G0 X75 Y{max_y} F3600          ; park nozzle at rear

    M117 Finished!
